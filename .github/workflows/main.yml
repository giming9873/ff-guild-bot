name: Free Fire Guild Bot 24/7
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install Android Tools & Emulator
      run: |
        sudo apt-get update
        sudo apt-get install -y adb qemu-kvm
        adb start-server

    - name: Run Guild Booster Bot
      run: |
        python final_bot.py
        
