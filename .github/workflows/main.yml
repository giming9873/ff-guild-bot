name: Free Fire Guild Bot 24/7
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: macos-15-intel  # समाधान: यह चालू इंटेल रनर है जो x86_64 इम्यूलेटर को सपोर्ट करता है
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run Android Emulator and Bot
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29  # एंड्रॉइड 10 इम्यूलेटर
        target: default
        arch: x86_64
        profile: Nexus 6
        script: |
          echo "[+] क्लाउड एंड्रॉइड इम्यूलेटर सफलतापूर्वक बूट हो गया है!"
          adb devices
          python final_bot.py
          
